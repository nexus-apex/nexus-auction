{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Auction | NexusAuction{% endblock %}
{% block page_title %}{% if editing %}Edit Auction{% else %}New Auction{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Auction Type</label>
        <select name="auction_type">
          <option value="english" {% if record.auction_type == 'english' %}selected{% endif %}>English</option>
          <option value="dutch" {% if record.auction_type == 'dutch' %}selected{% endif %}>Dutch</option>
          <option value="sealed" {% if record.auction_type == 'sealed' %}selected{% endif %}>Sealed</option>
          <option value="reserve" {% if record.auction_type == 'reserve' %}selected{% endif %}>Reserve</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Items Count</label>
        <input type="number" name="items_count" value="{{ record.items_count|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="live" {% if record.status == 'live' %}selected{% endif %}>Live</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" value="{{ record.start_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="end_date" value="{{ record.end_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Auction</button>
      <a href="/auctions/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
