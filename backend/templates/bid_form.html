{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Bid | NexusAuction{% endblock %}
{% block page_title %}{% if editing %}Edit Bid{% else %}New Bid{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Item Title</label>
        <input type="text" name="item_title" value="{{ record.item_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Bidder Name</label>
        <input type="text" name="bidder_name" value="{{ record.bidder_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Bid Time</label>
        <input type="date" name="bid_time" value="{{ record.bid_time|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="outbid" {% if record.status == 'outbid' %}selected{% endif %}>Outbid</option>
          <option value="won" {% if record.status == 'won' %}selected{% endif %}>Won</option>
          <option value="retracted" {% if record.status == 'retracted' %}selected{% endif %}>Retracted</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="auto_bid" id="id_auto_bid" {% if record.auto_bid %}checked{% endif %}>
        <label for="id_auto_bid" style="margin-bottom:0">Auto Bid</label>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Max Amount</label>
        <input type="number" step="0.01" name="max_amount" value="{{ record.max_amount|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Bid</button>
      <a href="/bids/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
